name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build with PyInstaller
        run: python -m PyInstaller fileserver.spec --noconfirm

      - name: Verify PyInstaller output
        run: |
          if (!(Test-Path "dist\FileServer\FileServer.exe")) {
            Write-Error "PyInstaller output not found"
            exit 1
          }
          Write-Host "FileServer.exe built successfully"
          Get-ChildItem "dist\FileServer" | Select-Object Name, Length

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile Inno Setup installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer\fileserver.iss
        shell: powershell

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileServerSetup
          path: installer/Output/FileServerSetup-*.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-installer
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: FileServerSetup
          path: ./release-assets

      - name: List artifacts
        run: ls -la ./release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## 63xky FileServer ${{ github.ref_name }}

            ### Installation
            1. Download `FileServerSetup-*.exe` below
            2. Run the installer
            3. Launch from Desktop shortcut or Start Menu

            ### What's included
            - Bundled Python runtime (no Python installation needed)
            - Textual TUI operator console
            - System tray mode (`--tray` flag)
            - Optional cloudflared installation for public sharing

            ### Upgrade
            Simply run the new installer over the existing installation.
            Your settings in `%APPDATA%\63xkyFileServer` are preserved.
          files: ./release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
